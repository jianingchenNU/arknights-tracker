name: Arknights Endfield Tracker

on:
  schedule:
    # 每两小时运行一次
    - cron: "0 */2 * * *"
  # 支持手动触发，方便测试
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限以 git push seen_announcements.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen_announcements.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_announcements.json
          # 只有文件有变动时才提交
          if git diff --cached --quiet; then
            echo "seen_announcements.json 无变化，跳过提交"
          else
            git commit -m "chore: update seen announcements [skip ci]"
            git push
          fi
